<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 밴드 마스터 v10.1 (404 에러 해결판)</title>
    <style>
        body { font-family: 'Pretendard', -apple-system, sans-serif; background-color: #0f172a; color: #f8fafc; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .container { background: #1e293b; padding: 40px; border-radius: 20px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); width: 100%; max-width: 850px; }
        
        h1 { text-align: center; color: #38bdf8; margin-bottom: 8px; font-size: 2.4rem; letter-spacing: -0.025em; }
        p.subtitle { text-align: center; color: #94a3b8; font-size: 1.1rem; margin-bottom: 35px; }

        #mainScreen { text-align: center; animation: fadeIn 0.6s ease-out; }
        .hero-icon { font-size: 5.5rem; margin-bottom: 25px; filter: drop-shadow(0 0 15px rgba(56, 189, 248, 0.4)); }
        
        .api-key-box { background: #334155; padding: 25px; border-radius: 16px; margin-bottom: 35px; border: 1px solid #475569; text-align: left; }
        .api-key-box label { color: #f43f5e; font-weight: 700; font-size: 1.1rem; display: block; margin-bottom: 10px; }
        .input-group { display: flex; gap: 12px; }
        .input-group input { flex: 1; padding: 14px; border: 1px solid #475569; border-radius: 10px; background: #0f172a; color: white; font-size: 1rem; outline: none; transition: 0.3s; }
        .input-group input:focus { border-color: #38bdf8; box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.2); }
        .btn-save { padding: 0 28px; background: #f43f5e; color: white; border: none; border-radius: 10px; font-weight: 700; font-size: 1rem; cursor: pointer; transition: 0.2s; }
        .btn-save:hover { background: #fb7185; }
        .btn-save.saved { background: #10b981; cursor: default; }
        
        #keyStatus { display: none; color: #10b981; font-size: 0.95rem; margin-top: 12px; font-weight: 600; text-align: center; }

        .btn-attach {
            display: inline-block; padding: 20px 45px; background: linear-gradient(135deg, #0ea5e9 0%, #2563eb 100%);
            color: white; border: none; border-radius: 50px; font-size: 1.4rem; font-weight: 800;
            cursor: pointer; transition: all 0.4s; box-shadow: 0 10px 20px -5px rgba(37, 99, 235, 0.4);
        }
        .btn-attach:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 15px 25px -5px rgba(37, 99, 235, 0.5); }
        .btn-attach:disabled { opacity: 0.25; cursor: not-allowed; transform: none; background: #64748b; box-shadow: none; }
        
        #fileInput { display: none; }
        
        #loadingScreen { display: none; text-align: center; padding: 60px 20px; }
        .spinner { margin: 25px auto; width: 60px; height: 60px; border: 6px solid rgba(56, 189, 248, 0.2); border-top: 6px solid #38bdf8; border-radius: 50%; animation: spin 1s linear infinite; }
        .loading-text { color: #38bdf8; font-size: 1.4rem; font-weight: 700; margin-top: 25px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        #resultScreen { display: none; animation: fadeIn 0.7s cubic-bezier(0.4, 0, 0.2, 1); }
        .editor-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px; }
        .editor-box { background: #334155; padding: 20px; border-radius: 16px; border: 1px solid #475569; }
        .editor-title { font-size: 1.05rem; font-weight: 700; color: #f1f5f9; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
        select { width: 100%; padding: 14px; background: #1e293b; color: white; border: 1px solid #475569; border-radius: 10px; font-size: 1rem; margin-bottom: 15px; cursor: pointer; }
        textarea { width: 100%; height: 90px; background: #0f172a; color: #38bdf8; border: 1px solid #475569; border-radius: 10px; padding: 15px; font-family: 'Fira Code', monospace; font-size: 1.1rem; resize: none; box-sizing: border-box; }

        .band-controls { display: flex; gap: 12px; margin-bottom: 30px; background: #334155; padding: 25px; border-radius: 16px; flex-wrap: wrap; justify-content: space-between; border: 1px solid #475569; }
        .mixer-title { width: 100%; margin-bottom: 12px; color: #38bdf8; font-weight: 800; font-size: 1.15rem; }
        .track-toggle { display: flex; align-items: center; gap: 10px; font-weight: 700; color: #cbd5e1; cursor: pointer; background: #1e293b; padding: 10px 15px; border-radius: 8px; transition: 0.2s; }
        .track-toggle:hover { background: #475569; }
        .track-toggle input[type="checkbox"] { width: 22px; height: 22px; accent-color: #38bdf8; cursor: pointer; }

        .btn-play { width: 100%; padding: 22px; background: linear-gradient(135deg, #10b981 0%, #059669 100%); color: white; border: none; border-radius: 16px; font-size: 1.5rem; font-weight: 900; cursor: pointer; transition: 0.3s; box-shadow: 0 10px 20px -5px rgba(16, 185, 129, 0.3); }
        .btn-play:hover { transform: scale(1.02); filter: brightness(1.1); }
        .btn-play.stop { background: linear-gradient(135deg, #f43f5e 0%, #e11d48 100%); box-shadow: 0 10px 20px -5px rgba(244, 63, 94, 0.3); }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
</head>
<body>

<div class="container">
    <h1>🎼 AI 밴드 마스터</h1>
    <p class="subtitle" id="mainSubtitle">악보 이미지를 스캔하여 고품질 풀 밴드 사운드를 생성합니다.</p>

    <div id="mainScreen">
        <div class="hero-icon">🎹</div>
        
        <div class="api-key-box">
            <label>🔑 Gemini API Key (구글 AI 스튜디오 발급)</label>
            <div class="input-group">
                <input type="password" id="apiKeyInput" placeholder="이곳에 API 키를 붙여넣으세요">
                <button class="btn-save" id="saveKeyBtn">저장하기</button>
            </div>
            <div id="keyStatus">✅ 키가 저장되었습니다! 악보를 첨부해주세요.</div>
        </div>

        <button class="btn-attach" id="attachBtn" disabled>🔒 먼저 키를 저장해주세요</button>
        <input type="file" id="fileInput" accept="image/jpeg, image/png">
    </div>

    <div id="loadingScreen">
        <div class="spinner"></div>
        <div class="loading-text">AI가 음악 데이터를 추출하는 중입니다...</div>
        <p style="color: #94a3b8; margin-top:10px;">(악보에 따라 5~15초 소요됩니다)</p>
    </div>

    <div id="resultScreen">
        <div class="editor-grid">
            <div class="editor-box">
                <div class="editor-title">🔍 조표 (Key Signature)</div>
                <select id="keyInput">
                    <option value="C">C Major (다장조)</option>
                    <option value="G">G Major (사장조)</option>
                    <option value="D">D Major (라장조)</option>
                    <option value="F">F Major (바장조)</option>
                </select>
                <div class="editor-title">🎸 코드 진행</div>
                <textarea id="chordInput"></textarea>
            </div>
            <div class="editor-box">
                <div class="editor-title">🎹 멜로디 라인</div>
                <textarea id="melodyInput"></textarea>
            </div>
        </div>

        <div class="band-controls">
            <div class="mixer-title">🎛️ 밴드 트랙 믹서</div>
            <label class="track-toggle"><input type="checkbox" id="muteMelody" checked> 🎹 멜로디</label>
            <label class="track-toggle"><input type="checkbox" id="muteChord" checked> 🎸 반주</label>
            <label class="track-toggle"><input type="checkbox" id="muteBass" checked> 🎸 베이스</label>
            <label class="track-toggle"><input type="checkbox" id="muteDrum" checked> 🥁 드럼</label>
        </div>

        <button id="playBtn" class="btn-play">▶ 밴드 합주 시작</button>
    </div>
</div>

<script>
    /* =========================================
       1. UI 흐름 및 AI 스캔 기능
    ========================================= */
    const apiKeyInput = document.getElementById('apiKeyInput');
    const saveKeyBtn = document.getElementById('saveKeyBtn');
    const keyStatus = document.getElementById('keyStatus');
    const attachBtn = document.getElementById('attachBtn');
    const fileInput = document.getElementById('fileInput');

    // [저장하기] 버튼 이벤트 (키에서 불순물 제거 추가)
    saveKeyBtn.addEventListener('click', () => {
        // 따옴표나 불필요한 공백을 강제로 제거합니다.
        let cleanKey = apiKeyInput.value.replace(/['"]/g, '').trim();
        apiKeyInput.value = cleanKey;

        if (cleanKey.length < 10) return alert("유효한 API 키를 입력하세요.");
        
        saveKeyBtn.innerText = "저장 완료";
        saveKeyBtn.classList.add('saved');
        keyStatus.style.display = 'block';
        attachBtn.disabled = false;
        attachBtn.innerText = "📁 악보 첨부 및 스캔 시작";
    });

    attachBtn.addEventListener('click', () => fileInput.click());

    // 파일 첨부 시 이벤트
    fileInput.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        const apiKey = apiKeyInput.value.trim();
        if (!file) return;

        // 로딩 화면 표시
        document.getElementById('mainScreen').style.display = 'none';
        document.getElementById('mainSubtitle').style.display = 'none';
        document.getElementById('loadingScreen').style.display = 'block';

        try {
            // 파일을 문자열(Base64)로 변환
            const base64Image = await new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result.split(',')[1]);
                reader.onerror = error => reject(error);
                reader.readAsDataURL(file);
            });

            // AI 호출
            await analyzeSheetMusic(base64Image, apiKey);

        } catch (error) {
            alert("⚠️ 스캔 실패!\n원인: " + error.message);
            
            // 다시 메인 화면으로 돌려보냄
            document.getElementById('loadingScreen').style.display = 'none';
            document.getElementById('mainScreen').style.display = 'block';
            document.getElementById('mainSubtitle').style.display = 'block';
            fileInput.value = ''; // 파일 선택 초기화
        }
    });

    // 구글 Gemini API 호출 함수 (404 원천 차단형)
    async function analyzeSheetMusic(base64Image, apiKey) {
        // [중요 수정] 모델 이름을 'gemini-1.5-flash-latest'로 변경하여 404 에러 방지
        const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=${apiKey}`;
        const promptText = `Analyze sheet music image. Respond ONLY with JSON format exactly like this: {"key": "C", "melody": "C4 D4 E4 -", "chords": "C * * *"}`;

        const response = await fetch(endpoint, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
                contents: [{ 
                    parts: [
                        { text: promptText }, 
                        { inline_data: { mime_type: "image/jpeg", data: base64Image } }
                    ] 
                }] 
            })
        });

        // 상태 코드별 상세 에러 메시지
        if (!response.ok) {
            if (response.status === 404) {
                throw new Error("404 에러 - 입력하신 API 키가 유효하지 않거나 구글 서버가 모델을 찾을 수 없습니다. API 키를 다시 한 번 확인해 주세요.");
            } else if (response.status === 400) {
                throw new Error("400 에러 - 잘못된 요청입니다. 악보 이미지 형식이 맞는지 확인해주세요.");
            } else if (response.status === 403) {
                throw new Error("403 에러 - 권한이 없습니다. 해당 구글 클라우드 프로젝트에 Generative Language API가 활성화되어 있는지 확인하세요.");
            } else {
                throw new Error(`API 통신 에러 (상태코드: ${response.status})`);
            }
        }

        const data = await response.json();
        const aiText = data.candidates[0].content.parts[0].text;
        
        // JSON 파싱 (마크다운 찌꺼기 제거)
        const parsed = JSON.parse(aiText.replace(/```json/g, '').replace(/```/g, '').trim());

        // 결과 화면에 데이터 뿌려주기
        document.getElementById('keyInput').value = parsed.key || 'C';
        document.getElementById('melodyInput').value = parsed.melody || '';
        document.getElementById('chordInput').value = parsed.chords || '';
        
        // 화면 전환
        document.getElementById('loadingScreen').style.display = 'none';
        document.getElementById('resultScreen').style.display = 'block';
    }

    /* =========================================
       2. 밴드 연주 엔진
    ========================================= */
    let melodySynth, chordSynth, bassSynth, kick, snare, hihat, sequence;
    let isPlaying = false;

    const chordDict = { 'C': ['C3', 'E3', 'G3'], 'D': ['D3', 'F#3', 'A3'], 'E': ['E3', 'G#3', 'B3'], 'F': ['F3', 'A3', 'C4'], 'G': ['G3', 'B3', 'D4'], 'A': ['A3', 'C#4', 'E4'], 'B': ['B3', 'D#4', 'F#4'], 'Am': ['A3', 'C4', 'E4'], 'Dm': ['D3', 'F3', 'A3'], 'Em': ['E3', 'G3', 'B3'] };
    const keySignatures = { 'C': {}, 'G': { 'F': '#' }, 'D': { 'F': '#', 'C': '#' }, 'F': { 'B': 'b' } };

    function initInstruments() {
        if (melodySynth) return;
        melodySynth = new Tone.Synth({ oscillator: { type: "sine" } }).toDestination();
        chordSynth = new Tone.PolySynth(Tone.Synth, { oscillator: { type: "triangle" } }).toDestination();
        bassSynth = new Tone.MonoSynth({ oscillator: { type: "sawtooth" } }).toDestination();
        kick = new Tone.MembraneSynth().toDestination();
        snare = new Tone.NoiseSynth({ noise: { type: 'white' }, envelope: { attack: 0.005, decay: 0.1 } }).toDestination();
        hihat = new Tone.MetalSynth({ frequency: 200, envelope: { attack: 0.001, decay: 0.1 }, harmonicity: 5.1, modulationIndex: 32, resonance: 4000, octaves: 1.5 }).toDestination();
        
        melodySynth.volume.value = 2; 
        chordSynth.volume.value = -8; 
        bassSynth.volume.value = -2; 
        kick.volume.value = 2; 
        snare.volume.value = -10; 
        hihat.volume.value = -18;
    }

    const playBtn = document.getElementById('playBtn');
    async function togglePlay() {
        if (!isPlaying) {
            await Tone.start();
            initInstruments();
            Tone.Transport.bpm.value = 100;
            const melody = document.getElementById('melodyInput').value.trim().split(/\s+/);
            const chords = document.getElementById('chordInput').value.trim().split(/\s+/);
            const key = document.getElementById('keyInput').value;
            let step = 0;
            let lastChord = [];

            sequence = new Tone.Loop((time) => {
                const m = melody[step % melody.length] || '-';
                const c = chords[step % chords.length] || '*';
                
                if (document.getElementById('muteMelody').checked && m !== '-') {
                    let note = m;
                    const match = m.match(/^([A-G])([#b]?)([0-9])$/);
                    if (match && !match[2] && keySignatures[key] && keySignatures[key][match[1]]) {
                        note = match[1] + keySignatures[key][match[1]] + match[3];
                    }
                    melodySynth.triggerAttackRelease(note, "8n", time);
                }
                
                if (c !== '*' && chordDict[c]) lastChord = chordDict[c];
                
                if (document.getElementById('muteChord').checked && lastChord.length > 0) {
                    chordSynth.triggerAttackRelease(lastChord[[0,1,2,1][step%4]], "8n", time);
                }
                
                if (document.getElementById('muteBass').checked && lastChord.length > 0) {
                    if ([0, 4].includes(step % 8)) bassSynth.triggerAttackRelease(lastChord[0].replace(/[0-9]/, '1'), "8n", time);
                }
                
                if (document.getElementById('muteDrum').checked) {
                    hihat.triggerAttackRelease("32n", time);
                    if ([0, 4].includes(step % 8)) kick.triggerAttackRelease("C1", "8n", time);
                    if ([2, 6].includes(step % 8)) snare.triggerAttackRelease("16n", time);
                }
                step++;
            }, "8n").start(0);
            
            Tone.Transport.start();
            isPlaying = true; 
            playBtn.innerText = "■ 합주 정지"; 
            playBtn.classList.add('stop');
        } else {
            sequence.stop(); 
            Tone.Transport.stop();
            isPlaying = false; 
            playBtn.innerText = "▶ 밴드 합주 시작"; 
            playBtn.classList.remove('stop');
        }
    }
    playBtn.addEventListener('click', togglePlay);
</script>

</body>
</html>
